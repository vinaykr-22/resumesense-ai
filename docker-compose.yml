services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    depends_on:
      - redis
      - backend
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2

volumes:
  redis_data:
  chroma_data:
