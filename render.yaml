services:
  - type: web
    name: resumesense-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash startup.sh
    healthCheckPath: /api/v1/health
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://resumesense-ai-khaki.vercel.app
      - key: AUTO_SEED_JOBS
        value: "true"
      - key: PORT
        value: 10000
